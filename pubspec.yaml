name: jornada_do_conhecimento
description: Aplicativo de intervenção educativa sobre agrotóxicos para agricultores ribeirinhos.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  sqflite: ^2.3.3+1
  sqflite_common_ffi_web: ^1.1.1
  shared_preferences: ^2.3.3
  uuid: ^4.5.1
  intl: ^0.19.0
  crypto: ^3.0.0
  web: ^1.1.1
  geolocator: ^14.0.2
  url_launcher: ^6.3.2
  http: ^1.6.0
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.5
  connectivity_plus: ^6.1.4
  path: ^1.9.0
  flutter_tts: ^4.0.2
  pdf: ^3.11.1
  printing: ^5.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/data/
